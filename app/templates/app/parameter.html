<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

    <title>Parameter</title>
   
   
    
</head>
<body>
    <style>
html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    width: 100%;
    box-sizing: border-box; /* Includes border in the width and height calculations */
    overflow: hidden; /* Prevents scrolling caused by overflow */
}

body {
    font-family: Arial, sans-serif;
    border: 5px solid lightseagreen ;
} 
.container_1 {
    height: 35%;
    width: 100%;
    border: 1px solid black;
} 
.container_2 {
            height: 65%;
            width: 100%;
            border: 1px solid black;
            display: flex;
            background-color: bisque;
        }

        table {
            border-collapse: collapse;
            width: 100%;
            height: 70%;
            border: 2px solid black;
           
        }

        th, td {
            text-align: center;
            border: 1px solid black;
        }

        thead {
            height: 20%;
            width: 100%;
            font-size: 22px;
            font-weight: bold;
            text-align: center;
            color: white;
            background-color: lightseagreen ;
        }


        #tableBody-1 input {
            height: 90%;
            width: 90%;
            box-sizing: border-box;
            font-size: 22px;
            font-weight: bold;
            text-align: center;
            outline: none;
            border: none;
            
        }
        
.container_1_1 {
    height: 20%;
    width: 100%;
    background-color: lightgray;
    border: 1px solid black;
    margin: 0;
    padding: 0;
    display: flex; /* Enables flexbox */
    justify-content: center; /* Centers the label horizontally */
    align-items: center; /* Centers the label vertically */
    font-weight: bold;
    font-size: 35px;
    position: relative; /* Enables absolute positioning for children */
}

.container_1_1 label {
    margin: 0; /* Ensures the label stays perfectly centered */
}

#close_btn {
    position: absolute; /* Allows placement in the corner */
    right: 2%; /* Adjust distance from the right edge */
    background-color: #ff4c4c; /* Button background color */
    border: none; /* Removes border */
    border-radius: 5px; /* Rounded corners */
    width: 5%; /* Button width */
    height: 100%; /* Adjust the button height */
    display: flex; /* Flex layout for the icon */
    justify-content: center; /* Center the icon horizontally */
    align-items: center; /* Center the icon vertically */
    cursor: pointer; /* Changes cursor to pointer on hover */
}

#close_icon {
    font-size: 30px; /* Icon size */
    color: white; /* Icon color */
}


.container_1_2 {
    height:25%;
    width: 100%;
    background-color: rgb(149, 183, 246);
    border: 1px solid black;
    margin: 0;
    padding: 0;
    display: flex; /* Enables flexbox */
    flex-direction: rows; /* Arrange items vertically */
    justify-content: center; /* Centers content vertically */
    align-items: center; /* Centers content horizontally */
    
}
.container_1_2 label{
    font-size: 23px;
    font-weight: bold;
    margin-left: 3%;
} 
.container_1_2 input{
    width: 20%;
    height: 50%;
    font-size: 30px;
    font-weight: bold;
    text-align: center;
    margin-left: 1%;
} 
.container_1_2 select{
    width: 5%;
    height: 50%;
    font-size: 30px;
    font-weight: bold;
    text-align: center;
    margin-left: 1%;
} 
.container_1_3 {
    height:25%;
    width: 100%;
    background-color: rgb(246, 182, 62);
    border: 1px solid black;
    margin: 0;
    padding: 0;
    display: flex; /* Enables flexbox */
    flex-direction: rows; /* Arrange items vertically */
    justify-content: center; /* Centers content vertically */
    align-items: center; /* Centers content horizontally */
   
} 
.container_1_3 label{
    font-size: 23px;
    font-weight: bold;
    margin-left: 1%;
} 
.container_1_3 input {
    width: 20%;
    height: 50%;
    font-size: 30px;
    font-weight: bold;
    text-align: center;
    margin-left: 1%;
} 

.container_1_3 input[type="checkbox"] {
    width: 2%; /* Default width for checkboxes */
    height: 30%; /* Default height for checkboxes */
    margin-left: 1%; /* Minimal left margin for alignment */
}

.container_1_4 {
    height: 30%;
    width: 100%;
    background-color: lightgray;
    border: 1px solid black;
    margin: 0;
    padding: 0;
    display: flex; /* Enables flexbox */
    justify-content: center; /* Centers the label horizontally */
    align-items: center; /* Centers the label vertically */
    font-weight: bold;
    font-size: 35px;
    position: relative; /* Enables absolute positioning for children */
    gap: 3%; /* Space between buttons */
}


#addnew_btn, #save_btn, #delete_btn {
    background-color: #ff4c4c; /* Button background color */
    border-radius: 10px; /* Rounded corners */
    width: 10%; /* Button width */
    height: 60%; /* Button height */
    display: flex; /* Flexbox layout for content */
    justify-content: center; /* Centers text and icon horizontally */
    align-items: center; /* Centers text and icon vertically */
    font-size: 20px; /* Button font size */
    font-weight: bold; /* Bold text */
    color: white; /* Text color */
    cursor: pointer; /* Pointer cursor on hover */
    transition: background-color 0.3s ease; /* Smooth hover effect */
    border: 2px solid black;
}

#addnew_btn:hover, #save_btn:hover, #delete_btn:hover {
    background-color: #fa0505; /* Lighter red on hover */
}

#addnew_icon, #save_icon, #delete_icon {
    font-size: 20px; /* Icon size */
    margin-right: 8px; /* Space between icon and text */
}


</style>

<div class="container_1">
    <div class="container_1_1">
        <label>PARAMETER SETTINGS</label>
        <button type="button" id="close_btn">
            <i class="fas fa-times" id="close_icon"></i>
        </button>
    </div>
    <div class="container_1_2">
        <label for="srno">SR NO:</label>
        <select id="srno" >
            <option value="1">1</option>
            <option value="2">2</option>
            <option value="3">3</option>
            <option value="4">4</option>
            <option value="5">5</option>
        </select>


        <label for="part_model">PART MODEL:</label>
        <input type="text" id="part_model">

        <label for="part_name">PART NAME:</label>
        <input type="text" id="part_name">
    </div>
    <div class="container_1_3">
        <label for="char_lock">CHAR LOCK:</label>
        <input type="text" id="char_lock">

        <label for="char_lock_limit">CHAR LOCK LIMIT:</label>
        <input type="text" id="char_lock_limit">

        <label for="punch_no">PUNCH NO:</label>
        <input type="checkbox" id="punch_no">
    </div>
    <div class="container_1_4">
        <button type="button" id="addnew_btn">
            <i class="fas fa-plus" id="addnew_icon"></i> Add New
        </button>
        <button type="button" id="save_btn">
            <i class="fas fa-save" id="save_icon"></i> Save
        </button>
        <button type="button" id="delete_btn">
            <i class="fas fa-trash" id="delete_icon"></i> Delete
        </button>
    </div>
    
</div>
<div class="container_2">
    <table border="1" >
        <thead>
            <tr>
                <th style="width: 5%;">SR.NO</th>
                <th style="width: 15%;">PARAMETER NAME</th>
                <th style="width: 6%;">CHANNEL NO</th>
                <th style="width: 6%;">LOW MASTER</th>
                <th style="width: 6%;">HIGH MASTER</th>
                <th style="width: 6%;">NOMINAL</th>
                <th style="width: 6%;">LSL</th>
                <th style="width: 6%;">USL</th>
                <th style="width: 6%;">LTL</th>
                <th style="width: 6%;">UTL</th>
                <th style="width: 6%;">STEP NO</th>
                <th style="width: 6%;">DIGITS</th>
                <th style="width: 6%;">ID/OD</th>
            </tr>
        </thead>
        <tbody id="tableBody-1">
            
           
            
        </tbody>
    </table>
</div>
    <script>
       const tableBody = document.getElementById("tableBody-1");

// Array of column names for input IDs
const columnNames = [
    "SR_NO",
    "PARAMETER_NAME",
    "CHANNEL_NO",
    "LOW_MASTER",
    "HIGH_MASTER",
    "NOMINAL",
    "LSL",
    "USL",
    "LTL",
    "UTL",
    "STEP_NO",
    "DIGITS",
    "ID_OD"
];

// Options for cycling through values
const cycleOptions = {
    "CHANNEL_NO": [1, 2, 3, 4],
    "STEP_NO": [1, 2, 3, 4],
    "DIGITS": [1, 2, 3, 4],
    "ID_OD": ["ID", "OD"]
};

// Create 4 rows dynamically
for (let i = 1; i <= 4; i++) {
    const row = document.createElement("tr");
    row.id = `row-${i}`; // Assign a unique ID to each row

    columnNames.forEach((colName, index) => {
        const cell = document.createElement("td");

        if (index === 0) {
            // First column is SR.NO (static text)
            cell.textContent = i;
            cell.style.backgroundColor = "white";
        } else if (cycleOptions[colName]) {
            // Columns that require cycling through values
            cell.textContent = cycleOptions[colName][0]; // Set initial value
            cell.style.cursor = "pointer"; // Indicate that the cell is clickable
            cell.style.backgroundColor = "white";
            cell.style.fontWeight = "bold";
            cell.style.fontSize = "22px";
            cell.style.boxSizing = "border-box";
            cell.style.textAlign = "center"; // Ensure content is centered

            // Add click event to cycle through values
            cell.dataset.index = 0; // Keep track of the current index
            cell.addEventListener("click", () => {
                let currentIndex = parseInt(cell.dataset.index, 10);
                currentIndex = (currentIndex + 1) % cycleOptions[colName].length; // Cycle through values
                cell.textContent = cycleOptions[colName][currentIndex];
                cell.dataset.index = currentIndex; // Update index
            });
        } else {
            // Other columns have input fields
            const input = document.createElement("input");
            input.type = "text";
            input.id = `row-${i}-${colName}`; // Unique ID for input fields
            cell.appendChild(input);
        }

        // Add click event to select the entire row
        cell.addEventListener("click", () => {
            // Remove red background from all rows
            const allRows = tableBody.getElementsByTagName("tr");
            for (let row of allRows) {
                // Remove the red background from all cells in the row
                const cells = row.getElementsByTagName("td");
                for (let cell of cells) {
                    cell.style.backgroundColor = ""; // Reset background color for all cells in the row
                }
            }

            // Set the selected row's background color to red
            const rowCells = row.getElementsByTagName("td");
            for (let cell of rowCells) {
                cell.style.backgroundColor = "red"; // Set all cells in the row to red
            }
        });

        row.appendChild(cell);
    });

    tableBody.appendChild(row);
}


    </script>
    
</body>
</html>
